<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#09090B" />
    <meta name="screen-orientation" content="landscape" />
    <title>PocketTablet</title>
  </head>
  <body>
    <div id="root">
      <div id="pocket-error" style="display:flex;height:100dvh;align-items:center;justify-content:center;background:#09090B;color:#FAFAFA;font-family:system-ui,sans-serif;padding:24px;text-align:center;flex-direction:column;gap:16px">
        <p style="font-size:14px;color:#A1A1AA">Loading PocketTablet...</p>
      </div>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('pocket-error');
        if (el) el.innerHTML = '<h2 style="font-size:16px;font-weight:600;margin:0">Something went wrong</h2><p style="font-size:13px;color:#A1A1AA;margin:0;max-width:400px">' + (e.message || e.error?.message || 'Unknown error') + '</p><button onclick="location.reload()" style="padding:10px 24px;border-radius:12px;border:none;background:#EC4899;color:white;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px">Reload</button>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('pocket-error');
        if (el) el.innerHTML = '<h2 style="font-size:16px;font-weight:600;margin:0">Promise Error</h2><p style="font-size:13px;color:#A1A1AA;margin:0;max-width:400px">' + (e.reason?.message || 'Unknown error') + '</p><button onclick="location.reload()" style="padding:10px 24px;border-radius:12px;border:none;background:#EC4899;color:white;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px">Reload</button>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
